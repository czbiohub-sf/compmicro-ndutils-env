name: Test pip and conda install
runs:
  using: composite
  steps:
  - name: Set up Python 3.12
    uses: actions/setup-python@v6
    with:
      python-version: "3.12"
  - name: Checkout nd-embedding-atlas
    uses: actions/checkout@v4
    with:
      repository: czbiohub-sf/nd-embedding-atlas
      ref: b707e8c28a3fa3f876fe5805af7936b9505f36ab
      path: nd-embedding-atlas
  - name: Install nd-embedding-atlas from local checkout
    shell: bash
    run: python3 -m pip install ./nd-embedding-atlas
  - name: Install package via pip
    shell: bash
    run: python3 -m pip install .
  - name: Test pip installed version with unittest
    shell: bash
    run: python3 -m unittest discover
  - name: Install conda environment
    shell: bash
    run: $CONDA/bin/conda env update --name base --file=environment.yml
  - name: Test Conda installed version with unittest
    shell: bash
    run: $CONDA/bin/python3 -m unittest discover
